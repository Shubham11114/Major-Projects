 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WonderHub | Login</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Link to External CSS -->
  <link rel="stylesheet" href="login.css" />
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-blue-200">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-blue-600">Welcome Back!</h2>
      <p class="text-sm text-gray-500 mt-1">Login to explore amazing destinations</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" name="email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="Enter your email" required />
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="Enter your password" required />
      </div>

      <!-- Remember & Forgot -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="text-blue-600 rounded mr-2">
          Remember me
        </label>
        <a href="/listings/forget-password" class="text-blue-600 hover:underline">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-medium">
        Login
      </button>
    </form>

    <!-- Sign Up -->
    <p class="text-center text-sm text-gray-600 mt-6">
      Don’t have an account?
      <a href="/listings/signup" class="text-blue-600 hover:underline font-medium">Sign up</a>
    </p>
  </div>

</body>
</html>
