<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderHub | Forgot Password</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="forgot-password.css" />
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-blue-200">
    <div class="text-center mb-6">
       
      <h2 class="text-3xl font-bold text-blue-700 mb-2">Forgot Password</h2>
      <p class="text-gray-600 text-sm">
        Enter your registered email, and we’ll send you a link to reset your password.
      </p>
    </div>

    <form id="forgotForm" class="space-y-5">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" name="email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="Enter your email" required />
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-200 font-medium">
        Send Reset Link
      </button>
    </form>

    <!-- Back to login -->
    <p class="text-center text-sm text-gray-600 mt-6">
      Remembered your password?
      <a href="/listings/login" class="text-blue-600 hover:underline font-medium">Back to Login</a>
    </p>
  </div>

  <!-- Custom JS -->
  <script src="forgot-password.js"></script>
</body>
</html>
